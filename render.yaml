services:
  - type: web
    name: gestion-captura-api
    runtime: node
    rootDir: .
    buildCommand: npm ci && npm run build -w @gestion-captura/api
    startCommand: npm run start -w @gestion-captura/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: ENABLE_DEMO_DATA
        value: false
